<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edward Quianzon | Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container fade-in">
      <h1 class="page-title gradient-text">Get In Touch</h1>
      <div class="grid" style="align-items: start">
        <div class="glass-panel">
          <h2 style="margin-bottom: 20px">Contact Information</h2>
          <p style="margin-bottom: 15px">
            <strong>Email:</strong> <br /><a
              href="mailto:edward.quianzon.r@gmail.com"
              style="color: var(--secondary); text-decoration: none"
              >edward.quianzon.r@gmail.com</a
            >
          </p>
          <p style="margin-bottom: 15px">
            <strong>GitHub:</strong> <br /><a
              href="https://github.com/Edward1326"
              target="_blank"
              style="color: var(--secondary); text-decoration: none"
              >github.com/Edward1326</a
            >
          </p>
          <p>
            <strong>Phone:</strong> <br /><span style="color: var(--text-muted)"
              >+63 968 722 4933</span
            >
          </p>
        </div>

        <div class="glass-panel">
          <form>
            <input type="text" placeholder="Your Name" required />
            <input type="email" placeholder="Your Email" required />
            <textarea rows="4" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn primary" style="width: 100%">
              Send Message
            </button>
          </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
