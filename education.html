<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edward Quianzon | Education</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container fade-in">
      <h1 class="page-title gradient-text">Academic Journey</h1>
      <div class="glass-panel" style="max-width: 800px; margin: 0 auto">
        <div
          style="
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
          "
        >
          <h2 style="color: var(--primary)">BS Information Technology</h2>
          <h3>Ateneo de Davao University</h3>
          <p style="color: var(--secondary); font-weight: 500">
            2019 – Present
          </p>
        </div>

        <div
          style="
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
          "
        >
          <h2 style="color: var(--primary)">Senior High School</h2>
          <h3>Ateneo de Davao University Senior High School Unit</h3>
          <p style="color: var(--secondary); font-weight: 500">2017 – 2019</p>
        </div>

        <div>
          <h2 style="color: var(--primary)">Primary & Junior High</h2>
          <h3>General Santos Hope Christian School</h3>
          <p style="color: var(--secondary); font-weight: 500">2007 – 2017</p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
